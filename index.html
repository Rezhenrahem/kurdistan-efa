<!DOCTYPE html><html lang="ku">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurdistan-E-FA</title>
  <style>
    /* رێکخستنی گشتی پاشبنەما و فۆنت */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at center, #111827, #070a12);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    /* دیزاینی نوێی کارتەکە بە شێوازی شووشەیی درەوشاوە */
    .card {
      background: rgba(17, 24, 39, 0.7);
      padding: 35px 25px;
      border-radius: 24px;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(34, 197, 94, 0.2);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(34, 197, 94, 0.05);
      max-width: 360px;
      width: 85%;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(34, 197, 94, 0.4);
    }

    /* چاککردنی قەبارە و شێوازی لۆگۆکە */
    .logo-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 20px auto;
    }

    .logo {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #22c55e;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
      background-color: white;
    }

    /* دیزاینی ناونیشان */
    h1 {
      margin: 0 0 8px 0;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(to right, #22c55e, #eab308);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* دیزاینی وەسفەکە */
    p {
      font-size: 14px;
      color: #9ca3af;
      margin: 0 0 30px 0;
      line-height: 1.6;
    }

    /* بەشی بەستەرەکان و دوگمەکان */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .links a {
      display: block;
      padding: 14px;
      background: rgba(31, 41, 55, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      color: #e5e7eb;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* گۆڕانکاری کاتی دەست لێدان (Hover) */
    .links a:hover {
      background: #22c55e;
      color: #000;
      font-weight: 700;
      transform: scale(1.03);
      box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
    }
  </style>
</head>
<body dir="rtl"> 

  <div class="card">
    <div class="logo-container">
      <img src="https://i.ibb.co/4gnrWyLS/LOG.jpg" alt="Kurdistan-E-FA Logo" class="logo" />
    </div>

    <h1 dir="ltr">Kurdistan-E-FA</h1>
    <p>هەڵبژاردەی کوردستان لە یاری ئێفۆتباڵ مۆبایل</p>

    <div class="links">
      <a href="https://www.facebook.com/share/g/1BHwmvPKxM/" target="_blank">Facebook</a>
      <a href="https://www.tiktok.com/@halbzharday.kurdistan?_r=1&_t=ZS-96aKvquOIsr" target="_blank">TikTok</a>
      <a href="https://youtube.com/@kurdistan.efootball4kefa?si=_YxhuQLCE5xSgAFL" target="_blank">YouTube</a>
      <a href="mailto:KurdistanEsportFc@gmail.com">Email</a>
    </div>
  </div>

</body>
</html>
